backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

locale: 'fr'

collections:
  - name: "blog_fr"
    label: "Articles (Français)"
    folder: "blog/fr"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "layouts/article.njk" }
      - { label: "Lang", name: "lang", widget: "hidden", default: "fr" }
      - { label: "Titre", name: "title", widget: "string" }
      - { label: "Date de publication", name: "date", widget: "datetime" }
      - { label: "Description (SEO)", name: "description", widget: "string" }
      - { label: "Catégorie", name: "category", widget: "select", options: ["Coup de chaleur", "Protocoles médicaux", "Équipements secours", "Médecine tactique", "Événements sportifs", "Industrie & EHS"] }
      - { label: "Contenu", name: "body", widget: "markdown" }
      - { label: "Publié", name: "published", widget: "boolean", default: true }

  - name: "blog_en"
    label: "Articles (English)""
