backend:
  name: github
  repo: Arcmedix/kollder-website
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

locale: 'fr'

collections:
  - name: "blog_fr"
    label: "Articles (Français)"
    folder: "blog/fr"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Titre", name: "title", widget: "string" }
      - { label: "Date de publication", name: "date", widget: "datetime" }
      - { label: "Description (SEO)", name: "description", widget: "string", hint: "150-160 caractères max" }
      - { label: "Image principale", name: "image", widget: "image", required: false }
      - { label: "Catégorie", name: "category", widget: "select", options: ["Coup de chaleur", "Protocoles médicaux", "Équipements secours", "Médecine tactique", "Événements sportifs", "Industrie & EHS"] }
      - { label: "Contenu", name: "body", widget: "markdown" }
      - { label: "Publié", name: "published", widget: "boolean", default: true }

  - name: "blog_en"
    label: "Articles (English)"
    folder: "blog/en"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publication date", name: "date", widget: "datetime" }
      - { label: "Description (SEO)", name: "description", widget: "string", hint: "150-160 characters max" }
      - { label: "Main image", name: "image", widget: "image", required: false }
      - { label: "Category", name: "category", widget: "select", options: ["Heat stroke", "Medical protocols", "Rescue equipment", "Tactical medicine", "Sporting events", "Industry & EHS"] }
      - { label: "Content", name: "body", widget: "markdown" }
      - { label: "Published", name: "published", widget: "boolean", default: true }
