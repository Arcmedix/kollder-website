backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

locale: 'fr'

collections:
  - name: "blog_fr"
    label: "Articles (Francais)"
    folder: "blog/fr"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "layouts/article.njk" }
      - { label: "Lang", name: "lang", widget: "hidden", default: "fr" }
      - { label: "Titre", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Description", name: "description", widget: "string" }
      - { label: "Categorie", name: "category", widget: "select", options: ["Coup de chaleur", "Protocoles medicaux", "Equipements secours", "Medecine tactique", "Evenements sportifs", "Industrie et EHS"] }
      - { label: "Contenu", name: "body", widget: "markdown" }
      - { label: "Publie", name: "published", widget: "boolean", default: true }

  - name: "blog_en"
    label: "Articles (English)"
    folder: "blog/en"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "layouts/article.njk" }
      - { label: "Lang", name: "lang", widget: "hidden", default: "en" }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Description", name: "description", widget: "string" }
      - { label: "Category", name: "category", widget: "select", options: ["Heat stroke", "Medical protocols", "Rescue equipment", "Tactical medicine", "Sporting events", "Industry and EHS"] }
      - { label: "Content", name: "body", widget: "markdown" }
      - { label: "Published", name: "published", widget: "boolean", default: true }